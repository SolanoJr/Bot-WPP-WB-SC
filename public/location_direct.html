<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localização - Bot WPP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .coordinates {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            color: #ffcccc;
        }
        .success {
            background: rgba(0, 255, 0, 0.2);
            color: #ccffcc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Compartilhar Localização</h1>
        
        <div id="status" class="status">
            <div class="loading"></div>
            <p>Aguarde, obtendo sua localização...</p>
        </div>
        
        <div id="result" style="display: none;">
            <h3>📍 Sua Localização:</h3>
            <div class="coordinates" id="coords"></div>
            <div class="coordinates" id="accuracy"></div>
            <button class="btn" onclick="sendLocationDirect()">Enviar Localização</button>
        </div>
        
        <div id="error" style="display: none;" class="status error">
            <p>❌ Erro ao obter localização</p>
            <p id="errorMsg"></p>
            <button class="btn" onclick="retryLocation()">Tentar Novamente</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const chatId = urlParams.get('chatId');
        let currentPosition = null;

        if (!token || !chatId) {
            showError('Parâmetros inválidos. Use o link enviado pelo bot.');
        } else {
            getLocation();
        }

        function getLocation() {
            if (!navigator.geolocation) {
                showError('Seu navegador não suporta geolocalização.');
                return;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 30000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                position => {
                    currentPosition = position;
                    showLocation(position);
                },
                error => {
                    showError(getErrorMessage(error));
                },
                options
            );
        }

        function showLocation(position) {
            const { latitude, longitude, accuracy } = position.coords;
            
            document.getElementById('status').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('coords').innerHTML = 
                `📍 Latitude: ${latitude.toFixed(6)}<br>📍 Longitude: ${longitude.toFixed(6)}`;
            document.getElementById('accuracy').innerHTML = 
                `🎯 Precisão: ±${Math.round(accuracy)} metros`;
        }

        function showError(message) {
            document.getElementById('status').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMsg').textContent = message;
        }

        function getErrorMessage(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    return 'Permissão negada. Por favor, permita o acesso à localização.';
                case error.POSITION_UNAVAILABLE:
                    return 'Informações de localização indisponíveis.';
                case error.TIMEOUT:
                    return 'Tempo esgotado ao obter localização.';
                default:
                    return 'Erro desconhecido: ' + error.message;
            }
        }

        async function sendLocationDirect() {
            if (!currentPosition) {
                showError('Nenhuma localização obtida.');
                return;
            }

            const { latitude, longitude, accuracy } = currentPosition.coords;
            const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
            
            // Criar mensagem formatada
            const message = [
                '📍 **LOCALIZAÇÃO RECEBIDA COM SUCESSO!**',
                '',
                '🌍 **Suas Coordenadas:**',
                `📍 **Latitude:** ${latitude}`,
                `📍 **Longitude:** ${longitude}`,
                `🎯 **Precisão:** ±${accuracy} metros`,
                '',
                `🗺️ **Ver no Maps:** ${mapsLink}`,
                '',
                `⏰ **Data/Hora:** ${new Date().toLocaleString('pt-BR')}`,
                '',
                `🤖 **Status do Bot:** Localização processada com sucesso!`
            ].join('\n');
            
            // Enviar diretamente para o WhatsApp via webhook
            try {
                console.log('Enviando localização:', { 
                    lat: latitude, 
                    lng: longitude, 
                    token, 
                    chatId,
                    endpoint: 'https://bot-wpp-wb-sc.onrender.com/location/send-direct'
                });
                
                const response = await fetch('https://bot-wpp-wb-sc.onrender.com/location/send-direct', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chatId,
                        message,
                        location: {
                            latitude,
                            longitude,
                            accuracy
                        }
                    })
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('result').innerHTML = `
                        <div class="status success">
                            <h3>✅ Localização Enviada!</h3>
                            <p>Sua localização foi enviada com sucesso para o WhatsApp.</p>
                            <p>Você pode fechar esta página.</p>
                        </div>
                    `;
                } else {
                    showError(result.message || 'Erro ao enviar localização.');
                }
            } catch (error) {
                showError('Erro de conexão. Tente novamente.');
            }
        }

        function retryLocation() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            getLocation();
        }
    </script>
</body>
</html>
